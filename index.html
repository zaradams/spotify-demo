<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Steer the Queue</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:2rem 1rem}
.demo-wrap{display:flex;flex-direction:column;align-items:center;gap:1.5rem;width:100%;max-width:400px}
h1{font-size:15px;font-weight:500;color:#333;text-align:center;letter-spacing:0.01em}
.flow-tabs{display:flex;border:1px solid #ddd;border-radius:10px;overflow:hidden;width:320px}
.tab-btn{flex:1;padding:10px 0;font-size:13px;background:#f0f0ec;border:none;cursor:pointer;color:#666}
.tab-btn.active{background:#fff;color:#111;font-weight:500}
.phone-wrap{background:#e8e8e4;border-radius:20px;padding:1.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
.phone{width:260px;background:#111;border-radius:36px;overflow:hidden;border:5px solid #222;display:flex;flex-direction:column}
.hint{font-size:11px;color:#888;text-align:center;max-width:260px;line-height:1.6}
.hint span{color:#1DB954;font-weight:500}
.trigger-row{display:flex;flex-direction:column;align-items:center;gap:6px}
.trigger-label{font-size:11px;color:#888}
.trigger-label span{color:#1DB954;font-weight:500}
.trigger-btn{padding:7px 16px;font-size:12px;font-weight:500;border-radius:8px;border:1px solid #1DB954;background:transparent;color:#1DB954;cursor:pointer}
.trigger-btn:hover{background:rgba(29,185,84,0.08)}
.restart-btn{padding:7px 18px;font-size:12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#333;cursor:pointer}
.restart-btn:hover{background:#f5f5f5}
.dismissed-msg{font-size:11px;color:#666;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.ls-bg{background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);display:flex;flex-direction:column;padding:24px 14px 18px;min-height:460px}
.ls-time{color:#fff;font-size:42px;font-weight:200;text-align:center;letter-spacing:-1px}
.ls-date{color:rgba(255,255,255,0.55);font-size:13px;text-align:center}
.ls-spacer{flex:1}
.ls-prompt{background:rgba(29,185,84,0.13);border:0.5px solid rgba(29,185,84,0.38);border-radius:12px;padding:7px 13px;margin-bottom:6px}
.ls-prompt-top{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.ls-x{background:none;border:none;color:rgba(29,185,84,0.45);font-size:7px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.ls-x:hover{color:#1DB954}
.ls-prompt-q{color:#1DB954;font-size:12px;font-weight:500;flex:1}
.ls-prompt-btns{display:flex;gap:4px;justify-content:center}
.ls-prompt-btn{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;line-height:1.5;white-space:nowrap}
.ls-prompt-btn.yes{background:#1DB954;color:#000}
.ls-prompt-btn.no{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85)}
.ls-prompt-btn:hover{opacity:0.85}
.ls-result{border-radius:12px;padding:8px 10px;margin-bottom:6px}
.ls-result.queued{background:rgba(255,255,255,0.08)}
.ls-result.mixing{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.15)}
.ls-result-label{font-size:11px;font-weight:500;margin-bottom:3px}
.ls-result.queued .ls-result-label{color:#1DB954}
.ls-result.mixing .ls-result-label{color:rgba(255,255,255,0.6)}
.ls-result-song{color:rgba(255,255,255,0.85);font-size:12px;font-weight:500}
.ls-result-artist{color:rgba(255,255,255,0.45);font-size:10px;margin-top:1px}
.ls-notif{background:rgba(255,255,255,0.13);border-radius:16px;padding:10px 12px}
.ls-notif-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.ls-album{width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,#2a1a4a,#4a2a7a);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.ls-song-info{flex:1;min-width:0}
.ls-song{color:#fff;font-size:13px;font-weight:500}
.ls-artist{color:rgba(255,255,255,0.55);font-size:11px}
.ls-progress{height:2px;background:rgba(255,255,255,0.18);border-radius:1px;margin:6px 0}
.ls-progress-fill{height:100%;width:38%;background:#1DB954;border-radius:1px}
.ls-controls{display:flex;align-items:center;justify-content:center;gap:18px}
.ls-icon-btn{color:rgba(255,255,255,0.7);font-size:16px;background:none;border:none;padding:2px}
.app-bg{background:#121212;display:flex;flex-direction:column;min-height:460px}
.app-top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 6px}
.app-back{color:rgba(255,255,255,0.6);font-size:20px;background:none;border:none}
.app-title{color:rgba(255,255,255,0.55);font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.app-dots{color:rgba(255,255,255,0.6);font-size:18px}
.app-artwork{width:165px;height:165px;border-radius:8px;margin:6px auto;display:flex;align-items:center;justify-content:center;font-size:42px}
.app-artwork.dtmf{background:linear-gradient(135deg,#1a1a3a,#3a1a5a)}
.app-artwork.neverita{background:linear-gradient(135deg,#003366,#0055aa)}
.app-artwork.ilikeit{background:linear-gradient(135deg,#4a0020,#aa0040)}
.app-song-info{padding:0 20px;text-align:center}
.app-song-name{color:#fff;font-size:16px;font-weight:600;margin-bottom:3px}
.app-artist{color:rgba(255,255,255,0.5);font-size:12px}
.app-progress-bar{margin:10px 20px 0}
.app-prog-track{height:3px;background:rgba(255,255,255,0.15);border-radius:2px}
.app-prog-fill{height:100%;background:#1DB954;border-radius:2px}
.app-prog-times{display:flex;justify-content:space-between;margin-top:4px}
.app-prog-t{font-size:10px;color:rgba(255,255,255,0.4)}
.app-ctrl-row{display:flex;align-items:center;justify-content:space-between;padding:10px 24px 0}
.app-ctrl-btn{color:rgba(255,255,255,0.6);font-size:14px;background:none;border:none;cursor:pointer;width:32px;text-align:center}
.app-play-btn{width:46px;height:46px;min-width:46px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:none;flex-shrink:0;margin:0 auto}
.vibe-card{background:rgba(255,255,255,0.13);border:0.5px solid rgba(255,255,255,0.18);border-radius:12px;margin:10px 14px 0;padding:10px 12px}
.vibe-top{display:flex;align-items:center;gap:4px;margin-bottom:8px}
.vibe-x{background:none;border:none;color:rgba(255,255,255,0.6);font-size:8px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.vibe-x:hover{color:rgba(255,255,255,0.9)}
.vibe-label{color:#1DB954;font-size:12px;font-weight:500;flex:1}
.vibe-slider-row{display:flex;align-items:center;gap:8px}
.vibe-end{font-size:11px;color:rgba(255,255,255,0.6);width:32px}
.vibe-end.right{text-align:right}
.vibe-range{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer}
.vibe-range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer}
.vibe-result{border-radius:12px;margin:10px 14px 0;padding:10px 12px}
.vibe-result.chill{background:rgba(70,130,220,0.12);border:0.5px solid rgba(70,130,220,0.3)}
.vibe-result.hype{background:rgba(220,50,80,0.12);border:0.5px solid rgba(220,50,80,0.3)}
.vibe-result-label{font-size:10px;font-weight:500;margin-bottom:6px}
.vibe-result.chill .vibe-result-label{color:#4682DC}
.vibe-result.hype .vibe-result-label{color:#DC3252}
.vibe-result-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.vibe-result-info{flex:1;min-width:0}
.vibe-result-song{color:#fff;font-size:12px;font-weight:600}
.vibe-result-artist{color:rgba(255,255,255,0.5);font-size:10px;margin-top:1px}
.vibe-play-now{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:400;border:0.5px solid rgba(255,255,255,0.5);cursor:pointer;background:transparent;color:rgba(255,255,255,0.5);white-space:nowrap;flex-shrink:0}
.vibe-play-now:hover{color:#fff;border-color:rgba(255,255,255,0.85)}
</style>
</head>
<body>
<div class="demo-wrap">
  <h1>Spotify — Smart Listening Controls</h1>
  <div class="flow-tabs">
    <button class="tab-btn active" id="tab-lock" onclick="switchFlow('lock')">Lock screen</button>
    <button class="tab-btn" id="tab-app" onclick="switchFlow('app')">In-app player</button>
  </div>
  <div class="phone-wrap">
    <div class="phone" id="phone-frame"></div>
    <div id="bottom-area"></div>
  </div>
</div>
<script>
let currentFlow='lock',lockState='passive',appState='passive',sliderVal=50,sliderTimer=null,appVibeDir=null;
function notif(){return `<div class="ls-notif"><div class="ls-notif-row"><div class="ls-album">🎵</div><div class="ls-song-info"><div class="ls-song">Landslide</div><div class="ls-artist">Fleetwood Mac</div></div></div><div class="ls-progress"><div class="ls-progress-fill"></div></div><div class="ls-controls"><button class="ls-icon-btn">⏮</button><button class="ls-icon-btn">⏸</button><button class="ls-icon-btn">⏭</button></div></div>`;}
function lockScreen(){
  if(lockState==='passive') return `<div class="ls-bg"><div class="ls-time">1:07</div><div class="ls-date">Thursday, Apr 23</div><div class="ls-spacer"></div>${notif()}</div>`;
  if(lockState==='prompt') return `<div class="ls-bg"><div class="ls-time">1:07</div><div class="ls-date">Thursday, Apr 23</div><div class="ls-spacer"></div><div class="ls-prompt"><div class="ls-prompt-top"><button class="ls-x" onclick="lockTap('dismissed')">✕</button><span class="ls-prompt-q">More like this?</span></div><div class="ls-prompt-btns"><button class="ls-prompt-btn yes" onclick="lockTap('yes')">Yes ✓</button><button class="ls-prompt-btn no" onclick="lockTap('diff')">Different vibe</button></div></div>${notif()}</div>`;
  if(lockState==='yes') return `<div class="ls-bg"><div class="ls-time">1:07</div><div class="ls-date">Thursday, Apr 23</div><div class="ls-spacer"></div><div class="ls-result queued"><div class="ls-result-label">✓ Up next:</div><div class="ls-result-song">Dreams</div><div class="ls-result-artist">Fleetwood Mac</div></div>${notif()}</div>`;
  if(lockState==='diff') return `<div class="ls-bg"><div class="ls-time">1:07</div><div class="ls-date">Thursday, Apr 23</div><div class="ls-spacer"></div><div class="ls-result mixing"><div class="ls-result-label">Got it — mixing it up from here</div></div>${notif()}</div>`;
  return `<div class="ls-bg"><div class="ls-time">1:07</div><div class="ls-date">Thursday, Apr 23</div><div class="ls-spacer"></div>${notif()}</div>`;
}
function appScreen(){
  const pct=sliderVal+'%';
  const grad=`linear-gradient(to right,#4FC3F7 0%,#4FC3F7 ${pct},rgba(255,255,255,0.15) ${pct},rgba(255,255,255,0.15) 100%)`;
  let vibeHTML='';
  let artworkCls='dtmf',songName='DtMF',songArtist='Bad Bunny',songIcon='🎵',songProg='35%';
  if(appState==='slider'){vibeHTML=`<div class="vibe-card"><div class="vibe-top"><button class="vibe-x" onclick="appDismiss()">✕</button><span class="vibe-label">Switch the vibe?</span></div><div class="vibe-slider-row"><span class="vibe-end">Chill</span><input type="range" class="vibe-range" min="0" max="100" value="${sliderVal}" step="1" style="background:${grad}" oninput="onSlide(this)"><span class="vibe-end right">Hype</span></div></div>`;}
  else if(appState==='queued'&&appVibeDir){
    const isChill=appVibeDir==='chill';
    const nextSong=isChill?'Neverita':'I Like It';
    const nextArtist=isChill?'Bad Bunny':'Cardi B ft. Bad Bunny';
    const cls=isChill?'chill':'hype';
    const lbl=isChill?'✓ Up next — chilling it out:':'✓ Up next — turning it up:';
    vibeHTML=`<div class="vibe-result ${cls}"><div class="vibe-result-label">${lbl}</div><div class="vibe-result-row"><div class="vibe-result-info"><div class="vibe-result-song">${nextSong}</div><div class="vibe-result-artist">${nextArtist}</div></div><button class="vibe-play-now" onclick="playNow()">Play now</button></div></div>`;
  } else if(appState==='playing'&&appVibeDir){
    const isChill=appVibeDir==='chill';
    artworkCls=isChill?'neverita':'ilikeit';
    songName=isChill?'Neverita':'I Like It';
    songArtist=isChill?'Bad Bunny':'Cardi B ft. Bad Bunny';
    songIcon=isChill?'🌊':'🔥';
    songProg='5%';
  }
  return `<div class="app-bg"><div class="app-top-bar"><button class="app-back">∨</button><span class="app-title">Now playing</span><span class="app-dots">···</span></div><div class="app-artwork ${artworkCls}">${songIcon}</div><div class="app-song-info"><div class="app-song-name">${songName}</div><div class="app-artist">${songArtist}</div></div><div class="app-progress-bar"><div class="app-prog-track"><div class="app-prog-fill" style="width:${songProg}"></div></div><div class="app-prog-times"><span class="app-prog-t">1:24</span><span class="app-prog-t">3:45</span></div></div><div class="app-ctrl-row"><button class="app-ctrl-btn">🔀</button><button class="app-ctrl-btn">⏮</button><div class="app-play-btn">⏸</div><button class="app-ctrl-btn">⏭</button><button class="app-ctrl-btn">🔁</button></div>${vibeHTML}</div>`;
}
function lockTap(c){lockState=c;render();}
function appDismiss(){appState='dismissed';render();}
function playNow(){appState='playing';render();}
function onSlide(el){
  sliderVal=parseInt(el.value);
  const pct=sliderVal+'%';
  el.style.background=`linear-gradient(to right,#4FC3F7 0%,#4FC3F7 ${pct},rgba(255,255,255,0.15) ${pct},rgba(255,255,255,0.15) 100%)`;
  clearTimeout(sliderTimer);
  sliderTimer=setTimeout(()=>{appVibeDir=sliderVal<=50?'chill':'hype';appState='queued';render();},600);
}
function triggerFeature(){if(currentFlow==='lock')lockState='prompt';else appState='slider';render();}
function restart(){lockState='passive';appState='passive';sliderVal=50;appVibeDir=null;render();}
function switchFlow(f){
  currentFlow=f;lockState='passive';appState='passive';sliderVal=50;appVibeDir=null;
  clearTimeout(sliderTimer);
  document.getElementById('tab-lock').classList.toggle('active',f==='lock');
  document.getElementById('tab-app').classList.toggle('active',f==='app');
  render();
}
function render(){
  document.getElementById('phone-frame').innerHTML=currentFlow==='lock'?lockScreen():appScreen();
  const area=document.getElementById('bottom-area');
  const lockDone=['yes','diff','dismissed'].includes(lockState);
  const appDone=['playing','dismissed'].includes(appState);
  const done=currentFlow==='lock'?lockDone:appDone;
  const passive=(currentFlow==='lock'&&lockState==='passive')||(currentFlow==='app'&&appState==='passive');
  const midLock=currentFlow==='lock'&&lockState==='prompt';
  const midApp=currentFlow==='app'&&appState==='slider';
  const queuedApp=currentFlow==='app'&&appState==='queued';
  if(passive){area.innerHTML=`<div class="trigger-row"><div class="trigger-label"><span>Passive listening detected</span></div><button class="trigger-btn" onclick="triggerFeature()">Prompt Triggered →</button></div>`;}
  else if(midLock){area.innerHTML=`<div class="hint">Tap <span>Yes ✓</span>, <span>Different vibe</span>, or <span>✕</span> to dismiss</div>`;}
  else if(midApp){area.innerHTML=`<div class="hint">Drag slider <span>left</span> for chill, <span>right</span> for hype, or <span>✕</span> to dismiss</div>`;}
  else if(queuedApp){area.innerHTML=`<div class="hint">Tap <span>Play now</span> to skip straight to it, or just leave it — plays next automatically</div>`;}
  else if(done&&(lockState==='dismissed'||appState==='dismissed')){area.innerHTML=`<div class="dismissed-msg"><span>Prompt dismissed — music continues uninterrupted</span><br><button class="restart-btn" style="margin-top:8px" onclick="restart()">↺ Restart</button></div>`;}
  else if(done){area.innerHTML=`<button class="restart-btn" onclick="restart()">↺ Restart</button>`;}
  else{area.innerHTML='';}
}
render();
</script>
</body>
</html>
